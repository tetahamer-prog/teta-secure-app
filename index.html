<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE - የደቡብ ኦሞ ሰላምና ጸጥታ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #auth-ui { background: #1f2c33; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #00a884; box-shadow: 0 0 20px rgba(0, 168, 132, 0.2); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: white; outline: none; border-bottom: 2px solid transparent; }
        input:focus { border-bottom: 2px solid #00a884; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #00a884; color: white; width: 100%; margin-top: 10px; }
        #main-app { display: none; flex-direction: column; height: 95vh; width: 100%; max-width: 500px; background: #111b21; border-radius: 15px; overflow: hidden; }
        header { background: #202c33; padding: 15px; text-align: center; font-weight: bold; color: #00a884; border-bottom: 1px solid #222e35; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; background-color: #0b141a; }
        .controls { display: flex; gap: 10px; padding: 15px; background: #202c33; }
        .msg-bubble { background: #202c33; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid #00a884; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h2 style="color:#00a884;">🛡️ TETA SECURE</h2>
        <p style="font-size: 13px; color: #aebac1;">የደቡብ ኦሞ ሰላምና ጸጥታ መገናኛ</p>
        <input id="username" placeholder="ሙሉ ስም">
        <input id="secure-key" type="password" placeholder="ሚስጥራዊ የደህንነት ቁልፍ">
        <button onclick="login()">ግባ (LOGIN)</button>
    </div>

    <div id="main-app">
        <header>🛡️ TETA HUB - ደቡብ ኦሞ</header>
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msgInput" placeholder="መልዕክት ጻፍ...">
            <button onclick="send()" style="width:70px;">ላክ</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser;

        function login() {
            const name = document.getElementById('username').value;
            const key = document.getElementById('secure-key').value;
            if(name && key) {
                socket.emit('verify_secure_access', { username: name, key: key });
            } else { alert("እባክዎ መረጃዎችን ይሙሉ!"); }
        }

        socket.on('login_success', d => {
            myUser = d.user;
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        });

        socket.on('login_failed', d => alert(d.message));

        function send() {
            const text = document.getElementById('msgInput').value;
            if(text) {
                socket.emit('chat_message', { user: myUser, text: text });
                document.getElementById('msgInput').value = '';
            }
        }

        socket.on('chat_message', d => {
            const div = document.createElement('div');
            div.className = "msg-bubble";
            div.innerHTML = `<b>${d.user}:</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });
    </script>
</body>
</html>
