<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA - Secure Hub 🛡️</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0088cc">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .auth-container { background: #1a1a1a; padding: 30px; border-radius: 15px; width: 320px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid #0088cc; text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #111; }
        .controls { display: flex; gap: 10px; padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
        video { width: 150px; height: 110px; border-radius: 10px; background: #000; border: 2px solid #0088cc; }
        .video-overlay { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
    </style>
</head>
<body>

    <div id="auth-ui" class="auth-container">
        <h2 style="color:#0088cc;">🛡️ TETA SECURE</h2>
        <div id="login-form">
            <input id="username" placeholder="Phone or Email">
            <input id="password" type="password" placeholder="Password">
            <button onclick="handleAuth('login')" style="background:#0088cc; width:100%;">LOGIN</button>
            <p style="font-size:12px; color:#555;" onclick="toggleRegister()">አዲስ ተመዝገብ</p>
        </div>
        <div id="2fa-form" style="display:none;">
            <p id="2fa-msg">የኤስኤምኤስ ኮዱን ያስገቡ</p>
            <input id="2fa-input" type="number" style="font-size:24px; text-align:center;">
            <button onclick="verify2FA()" style="background:#28a745; width:100%;">VERIFY</button>
        </div>
    </div>

    <div id="main-app">
        <div class="video-overlay">
            <video id="localVideo" autoplay muted></video>
            <video id="remoteVideo" autoplay></video>
        </div>
        <div class="chat-area" id="chat-box"></div>
        <div class="controls">
            <button onclick="startCall('audio')" style="background:#007bff; border-radius:50%; width:50px; height:50px;">📞</button>
            <button onclick="startCall('video')" style="background:#28a745; border-radius:50%; width:50px; height:50px;">📹</button>
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button onclick="document.getElementById('fileInput').click()" style="background:#555;">📁</button>
            <input type="text" id="msgInput" style="flex:1;" placeholder="Message...">
            <button onclick="send()" style="background:#0088cc;">SEND</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser, myStream, peer;

        function handleAuth(type) {
            const data = { username: document.getElementById('username').value, password: document.getElementById('password').value };
            socket.emit(type, data);
        }

        socket.on('login_success', d => {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('2fa-form').style.display = 'block';
            window.targetCode = d.code; 
        });

        function verify2FA() {
            if(document.getElementById('2fa-input').value == window.targetCode) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                myUser = document.getElementById('username').value;
            } else { alert("Wrong Code!"); }
        }

        async function startCall(type) {
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
            if(type === 'video') document.getElementById('localVideo').srcObject = myStream;
            peer = new RTCPeerConnection({ iceServers: [{urls:'stun:stun.l.google.com:19302'}] });
            myStream.getTracks().forEach(t => peer.addTrack(t, myStream));
            peer.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            const offer = await peer.createOffer();
            await peer.setLocalDescription(offer);
            socket.emit('call_signal', { offer, from: myUser, callType: type });
        }

        socket.on('receive_signal', async (d) => {
            if(d.offer && confirm(d.from + " እየደወለ ነው...")) {
                await startCall(d.callType);
                await peer.setRemoteDescription(d.offer);
                const answer = await peer.createAnswer();
                await peer.setLocalDescription(answer);
                socket.emit('call_signal', { answer });
            } else if(d.answer) { peer.setRemoteDescription(d.answer); }
        });

        function send() {
            const text = document.getElementById('msgInput').value;
            if(text) socket.emit('chat_message', { user: myUser, text, type: 'text' });
            document.getElementById('msgInput').value = '';
        }

        function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = e => socket.emit('chat_message', { user: myUser, file: e.target.result, fileName: file.name, type: 'file' });
            reader.readAsDataURL(file);
        }

        socket.on('chat_message', d => displayMsg(d));
        socket.on('chat_history', h => h.forEach(displayMsg));

        function displayMsg(d) {
            const div = document.createElement('div');
            div.style.padding = "10px";
            div.innerHTML = d.type === 'file' ? 
                `<b>${d.user}:</b> <a href="${d.file}" download="${d.fileName}" style="color:#0088cc">📁 ${d.fileName}</a>` : 
                `<b>${d.user}:</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }
    </script>
</body>
</html>
