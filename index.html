<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE - ደቡብ ኦሞ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Login UI */
        #auth-ui { background: #1f2c33; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #00a884; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: white; outline: none; }
        .login-btn { background: #00a884; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Main App UI */
        #main-app { display: none; flex-direction: column; height: 95vh; width: 100%; max-width: 450px; background: #111b21; border-radius: 15px; overflow: hidden; position: relative; }
        
        header { background: #202c33; padding: 12px; text-align: center; border-bottom: 1px solid #222e35; }
        .header-title { font-weight: bold; color: #00a884; display: block; margin-bottom: 2px; }
        .encryption-status { font-size: 10px; color: #8696a0; display: flex; align-items: center; justify-content: center; gap: 4px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-color: #0b141a; }
        
        /* Encryption Notice in Chat */
        .secure-notice { align-self: center; background: #182229; color: #ffd279; font-size: 11px; padding: 5px 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; border: 1px solid #2a3942; width: 80%; line-height: 1.4; }

        /* Chat Bubbles */
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; line-height: 1.4; }
        .sent { align-self: flex-end; background: #005c4b; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #202c33; color: white; border-bottom-left-radius: 2px; }
        .sender-name { font-size: 11px; font-weight: bold; color: #00a884; display: block; margin-bottom: 2px; }

        .controls { display: flex; gap: 8px; padding: 12px; background: #202c33; }
        #msgInput { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        .send-btn { background: #00a884; color: white; border: none; padding: 10px 18px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h2 style="color:#00a884;">🛡️ TETA SECURE</h2>
        <input id="username" placeholder="ሙሉ ስም">
        <input id="secure-key" type="password" placeholder="ሚስጥራዊ የደህንነት ቁልፍ">
        <button class="login-btn" onclick="login()">ግባ (LOGIN)</button>
    </div>

    <div id="main-app">
        <header>
            <span class="header-title">🛡️ TETA HUB - ደቡብ ኦሞ</span>
            <span class="encryption-status">🔒 End-to-End Encrypted</span>
        </header>

        <div id="chat-box">
            <div class="secure-notice">
                🔒 መልዕክቶች እና ጥሪዎች በዚህ ቻት ውስጥ በኮድ የተቆለፉ ናቸው። ከእናንተ ውጭ (TETA SECURE ጭምር) ሊያነባቸው አይችልም።
            </div>
        </div>

        <div class="controls">
            <input type="text" id="msgInput" placeholder="መልዕክት ጻፍ..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser;

        function login() {
            const name = document.getElementById('username').value;
            const key = document.getElementById('secure-key').value;
            if(name && key) {
                socket.emit('verify_secure_access', { username: name, key: key });
            } else { alert("እባክዎ መረጃዎችን ይሙሉ!"); }
        }

        socket.on('login_success', d => {
            myUser = d.user;
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        });

        socket.on('login_failed', d => alert(d.message));

        function send() {
            const text = document.getElementById('msgInput').value;
            if(text) {
                socket.emit('chat_message', { user: myUser, text: text });
                document.getElementById('msgInput').value = '';
            }
        }

        function displayMsg(d) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = d.user === myUser;
            
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            const senderHtml = isMe ? "" : `<span class="sender-name">${d.user}</span>`;
            div.innerHTML = `${senderHtml}${d.text}`;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        socket.on('chat_message', d => displayMsg(d));
        socket.on('chat_history', h => h.forEach(displayMsg));
    </script>
</body>
</html>
