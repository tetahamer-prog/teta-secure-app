<!DOCTYPE html>
<html>
<head>
    <title>TETA SECURE CHAT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 400px; border: 1px solid #0f0; padding: 20px; display: none; }
        #login-container { text-align: center; border: 1px solid #0f0; padding: 30px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 80%; margin-bottom: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #messages { list-style: none; padding: 0; height: 200px; overflow-y: auto; border-bottom: 1px solid #0f0; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>🛡️ TETA SECURE</h2>
        <input id="username" type="text" placeholder="ስምህን አስገባ...">
        <br>
        <button onclick="startChat()">ግባ (LOGIN)</button>
    </div>

    <div id="chat-container">
        <h3>TETA Chat</h3>
        <ul id="messages"></ul>
        <input id="m" autocomplete="off" placeholder="መልዕክት ጻፍ..." /><button onclick="sendMessage()">ላክ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var user = "";

        function startChat() {
            user = document.getElementById('username').value;
            if(user) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('chat-container').style.display = 'block';
            }
        }

        function sendMessage() {
            var msg = document.getElementById('m').value;
            if(msg) {
                socket.emit('chat message', user + ": " + msg);
                document.getElementById('m').value = '';
            }
        }

        socket.on('chat message', function(msg){
            var li = document.createElement('li');
            li.textContent = msg;
            document.getElementById('messages').appendChild(li);
        });
    </script>
</body>
</html>
