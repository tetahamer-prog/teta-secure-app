<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA BRAND - All-In-One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-header: #2481cc; --tg-bg: #e6eff5; --tg-sent: #effdde; --tg-primary: #2481cc; --muted: #707579; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--tg-bg); }
        #menu-sidebar { width: 280px; background: white; position: fixed; left: -280px; height: 100%; transition: 0.3s; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        #menu-sidebar.active { left: 0; }
        #chat-list-column { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { background: var(--tg-header); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-size: cover; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14.5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: var(--tg-sent); }
        .received { align-self: flex-start; background: white; }
        .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        #contacts-overlay, #memories-overlay, #video-call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5000; flex-direction: column; background: white; }
        #memories-overlay, #video-call-overlay { background: #000; color: white; }
        .contact-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .input-bar { background: white; padding: 10px; display: flex; align-items: center; gap: 15px; border-top: 1px solid #ddd; }
        #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 9000; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeSidebar()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:1500;"></div>

    <div id="menu-sidebar">
        <div style="background: var(--tg-header); padding: 30px 20px; color: white;">
            <div style="width:50px; height:50px; background:rgba(255,255,255,0.2); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; border:1px solid white;">T</div>
            <b id="side-n">ተክለማርያም</b>
        </div>
        <div onclick="showContacts()" style="padding:15px; cursor:pointer;"><i class="fas fa-user"></i> Contacts</div>
        <div onclick="showMemories()" style="padding:15px; cursor:pointer;"><i class="fas fa-film"></i> Memories</div>
        <div onclick="location.reload()" style="padding:15px; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>

    <div id="chat-list-column">
        <div style="padding: 15px; display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars" onclick="openSidebar()" style="cursor:pointer; color: var(--tg-primary);"></i>
            <b>TETA BRAND</b>
        </div>
        <div id="story-bar" style="display: flex; gap: 10px; padding: 10px; overflow-x: auto; border-bottom: 1px solid #eee;">
            <div style="width:50px; height:50px; border-radius:50%; border:2px dashed #ccc; display:flex; align-items:center; justify-content:center; flex-shrink:0;" onclick="document.getElementById('st-up').click()"><i class="fas fa-plus"></i></div>
            <input type="file" id="st-up" style="display:none" onchange="uploadStory(this)">
            <div id="story-list" style="display:flex; gap:10px;"></div>
        </div>
        <div id="active-contacts-list" style="flex: 1; overflow-y: auto;"></div>
    </div>

    <div id="main-chat">
        <header>
            <div id="h-av" style="width:40px; height:40px; border-radius:50%; background:white; color:var(--tg-primary); display:flex; align-items:center; justify-content:center; font-weight:bold;">T</div>
            <div style="flex:1"><b id="h-nm">TETA AI ✨</b><br><small>online</small></div>
            <div style="display:flex; gap:20px; font-size:18px; cursor:pointer;">
                <i class="fas fa-video" onclick="startVideoCall()"></i>
                <i class="fas fa-phone" onclick="startVoiceCall()"></i>
            </div>
        </header>
        <div id="chat-box"></div>
        <div class="input-bar">
            <i class="fas fa-plus" onclick="document.getElementById('file-menu').click()" style="color:var(--muted); cursor:pointer;"></i>
            <input type="file" id="file-menu" style="display:none" accept="image/*,video/*" onchange="handleFileUpload(this)">
            <input type="text" id="msg-in" placeholder="Write..." style="flex:1; border:none; outline:none;" onkeypress="if(event.key==='Enter') send()">
            <i class="fas fa-microphone" style="color:var(--tg-primary); cursor:pointer;" onmousedown="startVoiceRecord()" onmouseup="stopVoiceRecord()"></i>
            <i class="fas fa-paper-plane" onclick="send()" style="color:var(--tg-primary); cursor:pointer;"></i>
        </div>
    </div>

    <div id="memories-overlay">
        <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <h2>Memories</h2>
            <i class="fas fa-times" onclick="hideMemories()" style="font-size:24px; cursor:pointer;"></i>
        </div>
        <div id="memory-list" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:5px; padding:10px;"></div>
    </div>

    <div id="auth">
        <div style="text-align:center; width:280px; background:white; padding:30px; border-radius:15px;">
            <div style="width:70px; height:70px; background:#2481cc; color:white; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:25px; font-weight:bold; margin:0 auto 15px;">T</div>
            <h3>TETA LOGIN</h3>
            <input id="u-n" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input id="u-k" placeholder="Key" type="password" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="login()" style="width:100%; padding:10px; background:#2481cc; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ENTER</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName, mediaRecorder, audioChunks = [];
        let savedMessages = JSON.parse(localStorage.getItem('teta_final_msgs') || '[]');

        window.onload = () => {
            savedMessages.forEach(d => displayMessage(d));
        };

        function login() {
            const u = document.getElementById('u-n').value;
            const k = document.getElementById('u-k').value;
            if(u && k === "OMO_SAFETY_2026_SECURE") { 
                myName = u; 
                document.getElementById('auth').style.display='none'; 
                document.getElementById('side-n').innerText = u;
                socket.emit('user_joined', u); 
            } else { alert("Key Error!"); }
        }

        socket.on('update_users', userList => {
            const list = document.getElementById('active-contacts-list');
            list.innerHTML = "";
            userList.forEach(u => {
                if(u !== myName) {
                    list.innerHTML += `<div class="contact-item" onclick="selectChat('${u}')">
                        <div style="width:40px; height:40px; border-radius:50%; background:#2481cc; color:white; display:flex; align-items:center; justify-content:center;">${u[0]}</div>
                        <b>${u}</b>
                    </div>`;
                }
            });
        });

        function handleFileUpload(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const type = input.files[0].type.startsWith('video') ? 'video' : 'image';
                    socket.emit('chat_message', { id: Date.now(), user: myName, media: e.target.result, type: type });
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function send() {
            const i = document.getElementById('msg-in');
            if(i.value.trim()) { socket.emit('chat_message', { id: Date.now(), user: myName, text: i.value, type: 'text' }); i.value=''; }
        }

        socket.on('chat_message', d => {
            displayMessage(d);
            savedMessages.push(d);
            localStorage.setItem('teta_final_msgs', JSON.stringify(savedMessages));
        });

        function displayMessage(d) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${d.user === myName ? 'sent' : 'received'}`;
            let content = `<b>${d.user}</b><br>`;
            if(d.type === 'image') content += `<img src="${d.media}" class="chat-media">`;
            else if(d.type === 'video') content += `<video controls class="chat-media"><source src="${d.media}"></video>`;
            else if(d.type === 'audio') content += `<audio controls src="${d.audio}"></audio>`;
            else content += d.text;
            div.innerHTML = content;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function showMemories() {
            const list = document.getElementById('memory-list'); list.innerHTML = "";
            document.getElementById('memories-overlay').style.display = 'flex';
            savedMessages.filter(m => m.type === 'image' || m.type === 'video').forEach(m => {
                const el = document.createElement(m.type === 'video' ? 'video' : 'img');
                el.src = m.media; el.style.width='100%'; el.style.height='100px'; el.style.objectFit='cover'; list.appendChild(el);
            });
        }
        function hideMemories() { document.getElementById('memories-overlay').style.display = 'none'; }
        function openSidebar() { document.getElementById('menu-sidebar').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeSidebar() { document.getElementById('menu-sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        function selectChat(n) { document.getElementById('h-nm').innerText = n; document.getElementById('h-av').innerText = n[0]; }
        function startVideoCall() { alert("Calling " + document.getElementById('h-nm').innerText); }
        function startVoiceCall() { alert("Calling " + document.getElementById('h-nm').innerText); }
        
        async function startVoiceRecord() {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const r = new FileReader();
                r.onload = e => socket.emit('chat_message', { id: Date.now(), user: myName, audio: e.target.result, type: 'audio' });
                r.readAsDataURL(new Blob(audioChunks));
            };
            mediaRecorder.start();
        }
        function stopVoiceRecord() { if(mediaRecorder) mediaRecorder.stop(); }
        function uploadStory(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('story-list').innerHTML += `<img src="${e.target.result}" style="width:50px; height:50px; border-radius:50%; border:2px solid #2481cc;">`; }; r.readAsDataURL(i.files[0]); } }
    </script>
</body>
</html>
