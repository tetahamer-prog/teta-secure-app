<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE AI PRO - v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --side: #111b21; --header: #202c33; --primary: #00a884; --text: #e9edef; --muted: #8696a0; --sent: #005c4b; --received: #202c33; }
        .light-mode { --bg: #f0f2f5; --side: #ffffff; --header: #008069; --primary: #008069; --text: #111b21; --muted: #667781; --sent: #d9fdd3; --received: #ffffff; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        /* Sidebar Design */
        #sidebar { width: 300px; background: var(--side); position: absolute; left: -300px; height: 100%; transition: 0.3s; z-index: 1000; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        #sidebar.active { left: 0; box-shadow: 5px 0 20px rgba(0,0,0,0.6); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 900; }
        
        .side-header { padding: 30px 20px; background: var(--header); text-align: center; }
        .p-circle { width: 70px; height: 70px; border-radius: 50%; background: var(--primary); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid white; }
        
        .settings-label { padding: 15px 20px 5px; font-size: 12px; color: var(--primary); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .menu-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item i { width: 20px; color: var(--muted); }

        /* Version Footer */
        .version-footer { margin-top: auto; padding: 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: var(--muted); background: rgba(0,0,0,0.1); }

        /* Main App Area */
        #main { flex: 1; display: none; flex-direction: column; }
        header { background: var(--header); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg); }
        .m-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14.5px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .sent { align-self: flex-end; background: var(--sent); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--received); border-bottom-left-radius: 2px; }
        .ai-mode { border-left: 4px solid #ffd700; background: #2a3942; }

        .input-bar { background: var(--header); padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        #msg-in { flex: 1; background: var(--side); border: none; padding: 12px 18px; border-radius: 25px; color: var(--text); outline: none; }
        
        .active-rec { color: #ff3b30 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body id="app-body">

    <div class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="side-header">
            <div class="p-circle"><i class="fas fa-user-shield"></i></div>
            <b id="display-name" style="font-size: 18px;">ተጠቃሚ</b><br>
            <small style="color: var(--primary); opacity: 0.8;">ደቡብ ኦሞ ጸጥታ</small>
        </div>

        <div class="settings-label">Settings</div>
        
        <div class="menu-item" onclick="toggleNight()"><i class="fas fa-moon"></i> Night / Light Mode</div>
        
        <div class="menu-item">
            <i class="fas fa-language"></i>
            <select onchange="changeLang(this.value)" style="background:none; color:inherit; border:none; outline:none; font-family:inherit; font-size:15px; width: 100%;">
                <option value="am">Language: አማርኛ</option>
                <option value="en">Language: English</option>
                <option value="or">Language: Oromiffa</option>
                <option value="tg">Language: ትግርኛ</option>
            </select>
        </div>

        <div class="menu-item" onclick="alert('የድምፅ ማሳወቂያ በርቷል')"><i class="fas fa-bell"></i> Notifications</div>
        <div class="menu-item" onclick="alert('የደህንነት ቁልፍ ተቀይሯል')"><i class="fas fa-lock"></i> Privacy & Security</div>
        <div class="menu-item" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> Clear Chat History</div>
        <div class="menu-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Logout</div>

        <div class="version-footer">
            <b>TETA SECURE v3.0 PRO</b><br>
            <span style="opacity: 0.6;">© 2026 AI-Enhanced Protection</span>
        </div>
    </div>

    <div id="main">
        <header>
            <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor:pointer; font-size: 20px;"></i>
            <div style="text-align:center">
                <b style="letter-spacing: 1px;">TETA HUB <span style="color:#ffd700">AI</span></b><br>
                <small id="sub-status" style="font-size: 9px; color: var(--muted);">Encrypted Connection</small>
            </div>
            <div style="display:flex; gap:18px; font-size: 18px; color: var(--muted);">
                <i class="fas fa-record-vinyl" id="rec-status" onclick="handleCallRecord()" style="cursor:pointer;" title="ጥሪ ቅዳ"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </header>

        <div id="chat-box"></div>

        <div class="input-bar">
            <i class="fas fa-microphone" id="voice-mic" onclick="startVoiceToText()" style="cursor:pointer; font-size:20px; color: var(--muted);"></i>
            <i class="fas fa-paperclip" onclick="document.getElementById('file-input').click()" style="color: var(--muted); cursor:pointer;"></i>
            <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)">
            <input type="text" id="msg-in" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--primary); border:none; width:42px; height:42px; border-radius:50%; color:white; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="auth-screen" style="margin:auto; width:300px; padding:45px 30px; background:var(--side); border-radius:25px; text-align:center; border:1px solid var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.4);">
        <h2 style="color:var(--primary); margin-bottom:30px;">🛡️ TETA LOGIN</h2>
        <input id="login-user" placeholder="ሙሉ ስም" type="text" style="width:100%; padding:12px; margin-bottom:15px; background:#2a3942; border:none; color:white; border-radius:8px; box-sizing: border-box;">
        <input id="login-key" placeholder="ሚስጥራዊ ቁልፍ" type="password" style="width:100%; padding:12px; margin-bottom:25px; background:#2a3942; border:none; color:white; border-radius:8px; box-sizing: border-box;">
        <button onclick="attemptLogin()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">LOGIN</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName, recorder, recordedChunks = [];

        function toggleSidebar() { 
            const s = document.getElementById('sidebar');
            s.classList.toggle('active');
            document.querySelector('.overlay').style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        function toggleNight() { document.body.classList.toggle('light-mode'); }

        // Voice to Text Logic
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechRec) {
            const recognition = new SpeechRec();
            recognition.lang = 'am-ET';
            recognition.onresult = (e) => {
                document.getElementById('msg-in').value = e.results[0][0].transcript;
                document.getElementById('voice-mic').classList.remove('active-rec');
            };
            function startVoiceToText() { 
                recognition.start(); 
                document.getElementById('voice-mic').classList.add('active-rec');
            }
        }

        // Recording Logic
        async function handleCallRecord() {
            if(!recorder || recorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => recordedChunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        socket.emit('save_call_record', { fileName: `TETA_REC_${Date.now()}.webm`, blob: reader.result });
                        alert("ጥሪው ተቀድቶ በግል ፎልደርዎ ውስጥ ተቀምጧል! ✅");
                    };
                    recordedChunks = [];
                };
                recorder.start();
                document.getElementById('rec-status').classList.add('active-rec');
            } else {
                recorder.stop();
                document.getElementById('rec-status').classList.remove('active-rec');
            }
        }

        function attemptLogin() {
            const u = document.getElementById('login-user').value;
            const k = document.getElementById('login-key').value;
            if(u && k === "OMO_SAFETY_2026_SECURE") {
                myName = u;
                socket.emit('verify_secure_access', { username: u, key: k });
            } else { alert("ስህተት: እባክዎ ትክክለኛ መረጃ ያስገቡ!"); }
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('display-name').innerText = myName;
        });

        function sendMsg() {
            const val = document.getElementById('msg-in').value;
            if(val) {
                socket.emit('chat_message', { user: myName, text: val, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                // AI Trigger
                if(val.length > 5) {
                    setTimeout(() => {
                        addMessageToUI({ user: "TETA AI ✨", text: `ለጥያቄዎ "${val}" ተገቢውን ምላሽ እያዘጋጀሁ ነው...`, isAI: true });
                    }, 1200);
                }
                document.getElementById('msg-in').value = '';
            }
        }

        function addMessageToUI(d) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = d.user === myName;
            div.className = `m-bubble ${isMe ? 'sent' : 'received'} ${d.isAI ? 'ai-mode' : ''}`;
            div.innerHTML = `<b>${d.user}</b><br>${d.text}<br><small style="font-size:9px; float:right; opacity:0.6; margin-top:4px;">${d.time || ''}</small>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('chat_message', d => addMessageToUI(d));
        function clearHistory() { document.getElementById('chat-box').innerHTML = ""; }
        function changeLang(l) { alert("Language switched to: " + l); }
    </script>
</body>
</html>
