<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA ULTIMATE - Nokia Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-header: #527da3; --tg-bg: #e6eff5; --tg-sent: #effdde; --tg-primary: #2481cc; --muted: #707579; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--tg-bg); }

        /* Sidebar & Columns */
        #menu-sidebar { width: 280px; background: white; position: fixed; left: -280px; height: 100%; transition: 0.3s; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        #menu-sidebar.active { left: 0; }
        #chat-list-column { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Stories Bar */
        #story-bar { display: flex; gap: 10px; padding: 10px; overflow-x: auto; border-bottom: 1px solid #eee; background: white; min-height: 75px; }
        .st-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--tg-primary); flex-shrink: 0; padding: 2px; cursor: pointer; }
        .st-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* UI Elements */
        header { background: var(--tg-header); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14.5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: var(--tg-sent); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }

        /* Call Overlay */
        #call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b141a; z-index: 4000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .call-avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--tg-primary); font-size: 50px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 3px solid white; }
        #remote-v { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #local-v { width: 100px; height: 140px; position: absolute; top: 20px; right: 20px; border-radius: 8px; border: 2px solid white; z-index: 4001; }
        .call-tools { position: absolute; bottom: 50px; display: flex; gap: 30px; z-index: 4002; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 24px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Sidebar Menu Items */
        .menu-item { padding: 15px 20px; display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .menu-item:hover { background: #f1f1f1; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1500; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeSidebar()"></div>

    <div id="menu-sidebar">
        <div style="background: var(--tg-header); padding: 30px 20px; color: white;">
            <div id="my-avatar" style="width: 60px; height: 60px; background: #2481cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 10px; border: 2px solid white;">T</div>
            <b id="my-name-label">User</b><br><small>TETA Secure Active</small>
        </div>
        <div class="menu-item" onclick="activateVoiceAI()"><i class="fas fa-robot"></i> TETA AI Assistant</div>
        <div class="menu-item"><i class="fas fa-users"></i> New Group</div>
        <div class="menu-item" onclick="startCall('audio')"><i class="fas fa-phone"></i> Calls</div>
        <div class="menu-item"><i class="fas fa-bookmark"></i> Saved Messages</div>
        <div class="menu-item" onclick="location.reload()" style="color:red;"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>

    <div id="chat-list-column">
        <div style="padding: 10px; display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars" onclick="openSidebar()" style="cursor:pointer; color: var(--muted); font-size: 18px;"></i>
            <input type="text" style="flex:1; padding: 8px 15px; background: #f1f1f1; border: none; border-radius: 20px; outline: none;" placeholder="Search">
        </div>
        
        <div id="story-bar">
            <div class="st-circle" onclick="document.getElementById('st-up').click()" style="border: 2px dashed #ccc; display:flex; align-items:center; justify-content:center; color:#999;"><i class="fas fa-plus"></i></div>
            <input type="file" id="st-up" style="display:none" onchange="uploadStory(this)">
            <div id="story-list" style="display:flex; gap:10px;"></div>
        </div>

        <div id="chats-container" style="overflow-y: auto; flex: 1;">
            <div class="chat-item" onclick="selectChat('TETA AI ✨', '✨')" style="padding:15px; display:flex; gap:12px; cursor:pointer; border-bottom:1px solid #f5f5f5;">
                <div style="width:50px; height:50px; border-radius:50%; background:var(--tg-primary); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:20px;">✨</div>
                <div><b>TETA AI ✨</b><br><small class="muted">እንዴት ልርዳዎት?</small></div>
            </div>
        </div>
    </div>

    <div id="main-chat">
        <header>
            <div id="header-avatar" style="width:40px; height:40px; border-radius:50%; background:white; color:var(--tg-primary); display:flex; align-items:center; justify-content:center; font-weight:bold;">✨</div>
            <div style="flex:1"><b id="chat-with">TETA AI ✨</b><br><small>online</small></div>
            <i class="fas fa-phone" onclick="startCall('audio')" style="cursor:pointer; font-size: 20px; margin-right: 15px;"></i>
            <i class="fas fa-video" onclick="startCall('video')" style="cursor:pointer; font-size: 20px; margin-right: 15px;"></i>
            <i class="fas fa-microphone" onclick="activateVoiceAI()" style="cursor:pointer; font-size: 20px;"></i>
        </header>
        <div id="chat-box"></div>
        <div style="background: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px;">
            <input type="text" id="msg-in" placeholder="Message" style="flex:1; border:none; outline:none; font-size:16px;" onkeypress="if(event.key==='Enter') send()">
            <i class="fas fa-paper-plane" onclick="send()" style="color: var(--tg-primary); font-size: 22px; cursor: pointer;"></i>
        </div>
    </div>

    <div id="call-overlay">
        <video id="remote-v" autoplay playsinline style="display:none;"></video>
        <video id="local-v" autoplay playsinline muted style="display:none;"></video>
        <div id="call-info" style="text-align: center;">
            <div class="call-avatar">✨</div>
            <h2 id="call-name">TETA AI</h2>
            <p id="call-status">እየጠራ ነው...</p>
        </div>
        <div class="call-tools">
            <button class="c-btn" style="background: #ff3b30;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <audio id="ringtone" loop>
        <source src="https://www.zedge.net/ringtone/8254b971-e5d3-356c-9473-0428d022ec14" type="audio/mpeg">
        <source src="https://search66.com/files/ringtone/2021/08/nokia_tune.mp3" type="audio/mpeg">
    </audio>

    <div id="auth" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; z-index:5000;">
        <div style="text-align:center; width:280px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="60" style="margin-bottom:20px;">
            <h2>TETA SECURE</h2>
            <input id="u-n" placeholder="ሙሉ ስም" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input id="u-k" placeholder="ሚስጥራዊ ቁልፍ" type="password" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--tg-primary); color:white; border:none; border-radius:8px; font-weight:bold;">ግባ</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName, recognition, localStream, ringtone = document.getElementById('ringtone');

        async function startCall(type) {
            document.getElementById('call-overlay').style.display = 'flex';
            document.getElementById('call-name').innerText = document.getElementById('chat-with').innerText;
            
            // Play Nokia Ringtone
            ringtone.play().catch(e => console.log("Audio play failed, user interaction needed."));

            try {
                const constraints = { audio: true, video: type === 'video' };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                if(type === 'video') {
                    document.getElementById('remote-v').style.display = 'block';
                    document.getElementById('local-v').style.display = 'block';
                    document.getElementById('call-info').style.display = 'none';
                    document.getElementById('local-v').srcObject = localStream;
                    document.getElementById('remote-v').srcObject = localStream;
                }
            } catch (err) { console.log(err); }
        }

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            ringtone.pause();
            ringtone.currentTime = 0;
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('call-info').style.display = 'block';
        }

        function openSidebar() { document.getElementById('menu-sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeSidebar() { document.getElementById('menu-sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }

        function uploadStory(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const div = document.createElement('div');
                    div.className = 'st-circle';
                    div.innerHTML = `<img src="${e.target.result}">`;
                    document.getElementById('story-list').prepend(div);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function login() {
            const u = document.getElementById('u-n').value;
            const k = document.getElementById('u-k').value;
            if(u && k === "OMO_SAFETY_2026_SECURE") {
                myName = u;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('my-name-label').innerText = u;
                socket.emit('verify_secure_access', { username: u, key: k });
            } else { alert("መረጃ ተሳስቷል!"); }
        }

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechRec) {
            recognition = new SpeechRec();
            recognition.lang = 'am-ET';
            recognition.onresult = (e) => socket.emit('ask_teta_ai', e.results[0][0].transcript);
        }
        function activateVoiceAI() { document.getElementById('call-overlay').style.display='none'; if(recognition) recognition.start(); }
        socket.on('ai_voice_response', d => { addMsg(d); const ut = new SpeechSynthesisUtterance(d.text); ut.lang = 'am-ET'; window.speechSynthesis.speak(ut); });

        function send() {
            const input = document.getElementById('msg-in');
            if(input.value.trim()) { socket.emit('chat_message', { user: myName, text: input.value }); input.value = ''; }
        }
        function addMsg(d) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${d.user === myName ? 'sent' : 'received'}`;
            div.innerHTML = `<b>${d.user}</b><br>${d.text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
        socket.on('chat_message', d => addMsg(d));
    </script>
</body>
</html>
