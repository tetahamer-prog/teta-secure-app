<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TETA BRAND - Chat & Call</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #2481cc;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        /* የቪዲዮ ጥሪ ክፍል (ከላይ በትንሹ እንዲታይ) */
        .call-section {
            background: #000;
            height: 30vh;
            position: relative;
            display: flex;
            justify-content: center;
            border-bottom: 2px solid #2481cc;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #localVideo {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 80px;
            height: 110px;
            border: 1px solid white;
            border-radius: 5px;
        }
        /* የቻት ክፍል (ከስር እንዲሆን) */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 10px;
        }
        .controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #fff;
        }
        button {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            color: white;
            font-weight: bold;
        }
        .btn-call { background-color: #28a745; }
        .btn-end { background-color: #dc3545; }
    </style>
</head>
<body>

<header>TETA BRAND</header>

<div class="call-section">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
</div>

<div class="controls">
    <button class="btn-call" onclick="startCall()">Start Call</button>
    <button class="btn-end" onclick="endCall()">End</button>
</div>

<div class="chat-section">
    <p style="text-align:center; color:#888;">Chat system is active below the call window.</p>
    <div id="chat-messages"></div>
</div>

<script>
    let localStream;
    async function startCall() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
        } catch (e) {
            alert("ካሜራ ለመክፈት አልተቻለም። እባክህ Permission ስጥ።");
        }
    }
    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            document.getElementById('localVideo').srcObject = null;
        }
    }
</script>

</body>
</html>
