<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE AI - v2.5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --side: #111b21; --header: #202c33; --primary: #00a884; --text: #e9edef; --muted: #8696a0; --sent: #005c4b; --received: #202c33; --ai-gold: #ffd700; }
        .light-mode { --bg: #f0f2f5; --side: #ffffff; --header: #008069; --primary: #008069; --text: #111b21; --muted: #667781; --sent: #d9fdd3; --received: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; transition: 0.3s; }

        /* Sidebar */
        #sidebar { width: 300px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); position: absolute; left: -300px; height: 100%; z-index: 1000; transition: 0.3s; display: flex; flex-direction: column; }
        #sidebar.active { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 900; }
        .item { padding: 12px 20px; display: flex; align-items: center; gap: 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }

        /* AI Helper UI */
        #ai-assistant { position: fixed; bottom: 80px; right: 20px; background: var(--header); border: 1px solid var(--ai-gold); padding: 10px; border-radius: 15px; display: none; width: 250px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 500; }
        .ai-btn { background: var(--ai-gold); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; color: black; font-weight: bold; margin-top: 5px; }

        /* Main App */
        #main { flex: 1; display: none; flex-direction: column; }
        header { background: var(--header); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: var(--bg); }
        .m-bubble { max-width: 85%; padding: 10px; border-radius: 10px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: var(--sent); }
        .received { align-self: flex-start; background: var(--received); }
        .ai-msg { background: #3c3c3c; border-left: 3px solid var(--ai-gold); }

        .input-area { background: var(--header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msg-in { flex: 1; background: var(--side); border: none; padding: 12px; border-radius: 20px; color: white; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div style="padding: 25px; background: var(--header);">
            <div style="width:50px; height:50px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:20px;"><i class="fas fa-robot"></i></div>
            <b id="side-username">ተጠቃሚ</b><br>
            <small style="color:var(--primary)">TETA SECURE PRO v2.5</small>
        </div>
        <div class="menu-list">
            <div class="item" onclick="toggleNight()"><i class="fas fa-adjust"></i> Night/Light Mode</div>
            <div class="item"><i class="fas fa-language"></i> Language: 
                <select onchange="changeLang(this.value)" style="background:none; color:var(--primary); border:none;">
                    <option value="am">አማርኛ</option>
                    <option value="en">English</option>
                    <option value="or">Oromiffa</option>
                    <option value="tg">ትግርኛ</option>
                </select>
            </div>
            <div class="item" onclick="clearHistory()"><i class="fas fa-trash"></i> <span class="lang" data-am="ታሪክ አጽዳ" data-en="Clear History" data-or="Seenaa Haqaa" data-tg="ታሪኽ አጽርዮ">ታሪክ አጽዳ</span></div>
        </div>
    </div>

    <div id="main">
        <header>
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <div style="text-align:center"><b>🛡️ TETA HUB <span style="color:var(--ai-gold)">AI</span></b></div>
            <i class="fas fa-magic" onclick="toggleAI()" style="color:var(--ai-gold); cursor:pointer;"></i>
        </header>

        <div id="chat-box"></div>

        <div id="ai-assistant">
            <small style="color:var(--ai-gold)">✨ TETA AI ረዳት</small>
            <div id="ai-suggestion" style="font-size:11px; margin:5px 0;">የጻፍከውን መልዕክት ላስተካክል?</div>
            <button class="ai-btn" onclick="aiAction('fix')">ጽሁፍ አስተካክል</button>
            <button class="ai-btn" onclick="aiAction('translate')">ተርጉም</button>
        </div>

        <div class="input-area">
            <i class="fas fa-paperclip" onclick="document.getElementById('file-in').click()"></i>
            <input type="file" id="file-in" style="display:none" onchange="sendFile(this)">
            <input type="text" id="msg-in" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--primary); border:none; width:40px; height:40px; border-radius:50%; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="auth" style="margin:auto; width:280px; padding:30px; background:var(--side); border-radius:15px; text-align:center; border:1px solid var(--primary);">
        <h3 style="color:var(--primary)">TETA AI SECURE</h3>
        <input id="u-name" placeholder="ስም" type="text" style="width:90%; padding:10px; margin-bottom:10px; background:#2a3942; border:none; color:white;">
        <input id="u-key" placeholder="ቁልፍ" type="password" style="width:90%; padding:10px; margin-bottom:20px; background:#2a3942; border:none; color:white;">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px;">ግባ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser, currentLang = 'am';

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleNight() { document.body.classList.toggle('light-mode'); }
        function toggleAI() { 
            const panel = document.getElementById('ai-assistant');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function changeLang(val) {
            currentLang = val;
            document.querySelectorAll('.lang').forEach(el => {
                el.innerText = el.getAttribute('data-' + val);
            });
            document.getElementById('msg-in').placeholder = (val === 'am') ? 'መልዕክት...' : (val === 'or') ? 'Ergaa...' : (val === 'tg') ? 'መልእኽቲ...' : 'Message...';
        }

        // AI Logic (ለጊዜው በ Simulation ይሰራል - ለወደፊቱ ከ OpenAI/Gemini API ጋር ይገናኛል)
        function aiAction(type) {
            const input = document.getElementById('msg-in');
            if(!input.value) return alert("መጀመሪያ መልዕክት ጻፍ!");
            
            if(type === 'fix') {
                input.value = "AI የተስተካከለ: " + input.value + " (በስርዓቱ የተረጋገጠ ✅)";
            } else if(type === 'translate') {
                const translations = {
                    'or': 'Ergaa keessan gara Oromiffaatti hiikameera.',
                    'tg': 'መልእኽትኹም ናብ ትግርኛ ተተርጉሙ እዩ።',
                    'en': 'Your message has been translated to English.'
                };
                input.value = translations[currentLang] || "Translated: " + input.value;
            }
            toggleAI();
        }

        function login() {
            const name = document.getElementById('u-name').value;
            const key = document.getElementById('u-key').value;
            if(name && key === "OMO_SAFETY_2026_SECURE") {
                myUser = name;
                socket.emit('verify_secure_access', { username: name, key: key });
            } else { alert("ስህተት!"); }
        }

        socket.on('login_success', () => {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('side-username').innerText = myUser;
        });

        function send() {
            const txt = document.getElementById('msg-in').value;
            if(txt) {
                socket.emit('chat_message', { user: myUser, text: txt, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                document.getElementById('msg-in').value = '';
            }
        }

        function sendFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                socket.emit('chat_message', { 
                    user: myUser, text: "AI Analysis: ፎቶ ተልኳል 📸", 
                    file: reader.result, fType: file.type 
                });
                // AI ፎቶውን ሲያይ የሚሰጠው ምላሽ (Simulation)
                setTimeout(() => {
                    addMessage({ user: "TETA AI ✨", text: "ይህ ፎቶ በደህንነት ሲስተማችን ተመርምሯል። ምንም አይነት ስጋት የለበትም። ✅", isAI: true });
                }, 1500);
            };
        }

        function addMessage(d) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `m-bubble ${d.user === myUser ? 'sent' : 'received'} ${d.isAI ? 'ai-msg' : ''}`;
            let content = d.text;
            if(d.file) content = `<img src="${d.file}" style="max-width:100%; border-radius:8px;"><br>` + content;
            div.innerHTML = `<b>${d.user}</b><br>${content}<br><small style="font-size:9px; float:right; opacity:0.6">${d.time || ''}</small>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('chat_message', d => addMessage(d));
    </script>
</body>
</html>
