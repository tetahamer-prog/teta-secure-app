<div class="menu-item" onclick="activateVoiceAI()" style="background: rgba(0, 168, 132, 0.1); border-left: 4px solid var(--primary);">
    <i class="fas fa-microphone-alt" style="color: var(--primary);"></i> <b>የድምፅ ረዳት (Voice AI)</b>
</div>

<div id="voice-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(11,20,26,0.95); z-index:3000; text-align:center; padding-top:100px;">
    <div class="p-avatar" style="width:120px; height:120px; margin:0 auto 30px; border:4px solid var(--primary); animation: pulse-border 2s infinite;">
        <i class="fas fa-robot fa-3x" style="color:var(--primary)"></i>
    </div>
    <h2 id="ai-status" style="color:white;">እየሰማሁ ነው...</h2>
    <p id="user-said" style="color:var(--muted); font-style:italic; padding:20px;"></p>
    <div id="wave-container" style="display:flex; justify-content:center; gap:5px; height:30px; margin-bottom:50px;">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <button onclick="stopVoiceAI()" style="background:#ff3b30; color:white; border:none; padding:15px 40px; border-radius:30px; font-weight:bold; cursor:pointer;">አቁም</button>
</div>

<style>
    @keyframes pulse-border { 0% { box-shadow: 0 0 0 0px rgba(0, 168, 132, 0.4); } 70% { box-shadow: 0 0 0 30px rgba(0, 168, 132, 0); } 100% { box-shadow: 0 0 0 0px rgba(0, 168, 132, 0); } }
    .wave-bar { width:5px; height:100%; background:var(--primary); animation: wave 1s infinite; }
    @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.5); } }
</style>

<script>
    // 1. ድምፅን ወደ ጽሁፍ መቀየር (Recognition)
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if(SpeechRec) {
        recognition = new SpeechRec();
        recognition.lang = 'am-ET'; // አማርኛ እንዲሰማ
        recognition.continuous = false;

        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            document.getElementById('user-said').innerText = `ያሉት፡ "${transcript}"`;
            document.getElementById('ai-status').innerText = "እያሰላሁ ነው...";
            socket.emit('ask_teta_ai', transcript); // ለ AI መላክ
        };

        recognition.onend = () => {
            if(document.getElementById('voice-overlay').style.display === 'block') {
                document.getElementById('ai-status').innerText = "ምላሽ እየሰጠሁ ነው...";
            }
        };
    }

    // 2. ጽሁፍን ወደ ድምፅ መቀየር (Synthesis)
    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'am-ET'; // አማርኛ እንዲናገር (ካለ) ወይም 'en-US'
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
        
        utterance.onend = () => {
            document.getElementById('ai-status').innerText = "ተናግሬ ጨርሻለሁ";
            setTimeout(stopVoiceAI, 2000); // ምላሹ ካለቀ በኋላ ዝጋው
        };
    }

    // AI Voice መቆጣጠሪያዎች
    function activateVoiceAI() {
        document.getElementById('voice-overlay').style.display = 'block';
        toggleSidebar();
        recognition.start();
        document.getElementById('ai-status').innerText = "እየሰማሁ ነው...";
    }

    function stopVoiceAI() {
        document.getElementById('voice-overlay').style.display = 'none';
        recognition.stop();
        window.speechSynthesis.cancel();
    }

    // ከ AI የሚመጣ የድምፅ ምላሽ መቀበያ
    socket.on('ai_voice_response', (data) => {
        addMsg({ user: data.user, text: data.text, isAI: true }); // በቻቱ ላይ አሳይ
        document.getElementById('ai-status').innerText = "እየተናገርኩ ነው...";
        speak(data.text); // በድምፅ ተናገር
    });
</script>
