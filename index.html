<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE AI PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --side: #111b21; --header: #202c33; --primary: #00a884; --text: #e9edef; --muted: #8696a0; --sent: #005c4b; --received: #202c33; }
        .light-mode { --bg: #f0f2f5; --side: #ffffff; --header: #008069; --primary: #008069; --text: #111b21; --muted: #667781; --sent: #d9fdd3; --received: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; transition: 0.3s; }
        
        #sidebar { width: 300px; background: var(--side); position: absolute; left: -300px; height: 100%; transition: 0.3s; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1); }
        #sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 900; }
        
        #main { flex: 1; display: none; flex-direction: column; }
        header { background: var(--header); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; color: white; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m-bubble { max-width: 80%; padding: 10px; border-radius: 10px; position: relative; }
        .sent { align-self: flex-end; background: var(--sent); }
        .received { align-self: flex-start; background: var(--received); }
        .ai-bubble { border-left: 4px solid #ffd700; background: #2a3942; }

        .controls { background: var(--header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; background: var(--side); border: none; padding: 12px; border-radius: 20px; color: white; outline: none; }
        
        .rec-active { color: red !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div style="padding: 30px; background: var(--header);">
            <i class="fas fa-user-shield fa-3x" style="color:var(--primary)"></i><br><br>
            <b id="side-name">User</b><br><small>TETA SECURE v3.0-PRO</small>
        </div>
        <div style="padding: 10px;">
            <div onclick="toggleNight()" style="padding:15px; cursor:pointer;"><i class="fas fa-moon"></i> Night Mode</div>
            <div style="padding:15px;">
                <i class="fas fa-globe"></i> 
                <select onchange="changeLang(this.value)" style="background:none; color:var(--primary); border:none;">
                    <option value="am">አማርኛ</option>
                    <option value="en">English</option>
                    <option value="or">Oromiffa</option>
                    <option value="tg">ትግርኛ</option>
                </select>
            </div>
            <div onclick="clearHistory()" style="padding:15px; cursor:pointer;"><i class="fas fa-trash"></i> Clear Chat</div>
        </div>
        <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-size:10px; color:var(--muted);">TETA Records Folder Active ✅</div>
    </div>

    <div id="main">
        <header>
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <div style="text-align:center"><b>TETA HUB <span style="color:#ffd700">AI</span></b></div>
            <div style="display:flex; gap:15px;">
                <i class="fas fa-record-vinyl" id="rec-icon" onclick="toggleRecording()" style="cursor:pointer;" title="ጥሪ ቅዳ"></i>
                <i class="fas fa-video"></i>
            </div>
        </header>

        <div id="chat-box"></div>

        <div class="controls">
            <i class="fas fa-microphone" id="mic-btn" onclick="startVoice()" style="cursor:pointer; font-size:20px;"></i>
            <i class="fas fa-paperclip" onclick="document.getElementById('f-in').click()"></i>
            <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">
            <input type="text" id="msg-in" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--primary); border:none; width:40px; height:40px; border-radius:50%; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="auth" style="margin:auto; width:300px; padding:40px; background:var(--side); border-radius:20px; text-align:center; border:1px solid var(--primary);">
        <h2 style="color:var(--primary)">🛡️ TETA SECURE</h2>
        <input id="u-name" placeholder="ሙሉ ስም" style="width:100%; padding:10px; margin:10px 0; background:#2a3942; border:none; color:white;">
        <input id="u-key" placeholder="ቁልፍ" type="password" style="width:100%; padding:10px; margin:10px 0; background:#2a3942; border:none; color:white;">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; cursor:pointer;">ግባ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser, mediaRecorder, chunks = [];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleNight() { document.body.classList.toggle('light-mode'); }

        // 1. Voice Recognition (ድምፅን ወደ ጽሁፍ)
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.onresult = (e) => {
                document.getElementById('msg-in').value = e.results[0][0].transcript;
                document.getElementById('mic-btn').classList.remove('rec-active');
            };
            function startVoice() { rec.start(); document.getElementById('mic-btn').classList.add('rec-active'); }
        }

        // 2. Call Recording (ጥሪ መቅጃ)
        async function toggleRecording() {
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        socket.emit('save_call_record', { fileName: `REC_${Date.now()}.webm`, blob: reader.result });
                        alert("ጥሪው ተቀድቶ በፎልደርዎ ውስጥ ተቀምጧል! ✅");
                    };
                    chunks = [];
                };
                mediaRecorder.start();
                document.getElementById('rec-icon').classList.add('rec-active');
            } else {
                mediaRecorder.stop();
                document.getElementById('rec-icon').classList.remove('rec-active');
            }
        }

        // 3. AI logic
        function askAI(txt) {
            if(txt.includes("?") || txt.length > 10) {
                setTimeout(() => {
                    addMsg({ user: "TETA AI ✨", text: `ለጥያቄዎ "${txt}" ዝርዝር መረጃ እያሰባሰብኩ ነው... [AI Analysis Active]`, isAI: true });
                }, 1000);
            }
        }

        function login() {
            const n = document.getElementById('u-name').value;
            const k = document.getElementById('u-key').value;
            if(n && k === "OMO_SAFETY_2026_SECURE") {
                myUser = n;
                socket.emit('verify_secure_access', { username: n, key: k });
            }
        }

        socket.on('login_success', () => {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('side-name').innerText = myUser;
        });

        function send() {
            const t = document.getElementById('msg-in').value;
            if(t) {
                socket.emit('chat_message', { user: myUser, text: t });
                askAI(t); // AI እንዲሳተፍ
                document.getElementById('msg-in').value = '';
            }
        }

        function addMsg(d) {
            const b = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `m-bubble ${d.user === myUser ? 'sent' : 'received'} ${d.isAI ? 'ai-bubble' : ''}`;
            div.innerHTML = `<b>${d.user}</b><br>${d.text}`;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        }

        socket.on('chat_message', d => addMsg(d));
        function clearHistory() { document.getElementById('chat-box').innerHTML = ""; }
    </script>
</body>
</html>
