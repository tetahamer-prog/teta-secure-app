<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TETA BRAND - Secure Chat</title>
    <style>
        /* ለስልክ ስክሪን የተስተካከለ ዲዛይን */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: #2481cc;
            color: white;
            width: 100%;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .video-container {
            position: relative;
            width: 95%;
            max-width: 500px;
            height: 70vh;
            background: #000;
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 150px;
            border: 2px solid white;
            border-radius: 10px;
            z-index: 10;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        button {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn { background-color: #28a745; color: white; }
        .hangup-btn { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

<header>TETA BRAND - Private Call</header>

<div class="video-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
</div>

<div class="controls">
    <button class="start-btn" onclick="startCall()">Call</button>
    <button class="hangup-btn" onclick="endCall()">End</button>
</div>

<script>
    let localStream;
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');

    // ካሜራ እና ማይክሮፎን እንዲከፈት መጠየቂያ
    async function startCall() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            console.log("ካሜራ ተከፍቷል!");
        } catch (error) {
            alert("እባክህ በስልክህ Settings ውስጥ ለካሜራ ፈቃድ ስጥ (Allow Camera)");
            console.error("Error accessing media devices.", error);
        }
    }

    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localVideo.srcObject = null;
        }
    }
</script>

</body>
</html>
