<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE - Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #auth-ui { background: #1f2c33; padding: 40px; border-radius: 15px; width: 320px; text-align: center; align-self: center; border: 1px solid #00a884; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: white; outline: none; }
        .login-btn { background: #00a884; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; }

        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 500px; background: #111b21; border: 1px solid #222e35; position: relative; }
        header { background: #202c33; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #0b141a; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 15px; position: relative; }
        .sent { align-self: flex-end; background: #005c4b; }
        .received { align-self: flex-start; background: #202c33; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        /* Conference UI */
        #video-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; display: none; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; background: #2a3942; }

        .controls { display: flex; gap: 10px; padding: 15px; background: #202c33; align-items: center; }
        #msgInput { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h2 style="color:#00a884;">🛡️ TETA SECURE</h2>
        <input id="username" placeholder="ሙሉ ስም">
        <input id="secure-key" type="password" placeholder="ሚስጥራዊ ቁልፍ">
        <button class="login-btn" onclick="login()">ግባ</button>
    </div>

    <div id="main-app">
        <header>
            <div><b style="color:#00a884;">🛡️ TETA HUB</b><br><small style="font-size: 10px; color:#8696a0;">🔒 Secure Network</small></div>
            <div style="display:flex; gap:15px; color:#8696a0;">
                <i class="fas fa-video" onclick="startCall()" style="cursor:pointer;"></i>
                <i class="fas fa-phone" onclick="startCall()" style="cursor:pointer;"></i>
            </div>
        </header>

        <div id="video-grid">
            <video id="localVideo" autoplay muted></video>
            <button onclick="endCall()" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:#dc3545; color:white; border:none; padding:15px; border-radius:50%;"><i class="fas fa-phone-slash"></i></button>
        </div>

        <div id="chat-box"></div>

        <div class="controls">
            <i class="fas fa-paperclip" style="color:#8696a0; cursor:pointer;" onclick="triggerFile()"></i>
            <input type="file" id="fileInput" style="display:none" onchange="sendFile(this)">
            <input type="text" id="msgInput" placeholder="መልዕክት ጻፍ..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:#00a884; border:none; width:40px; height:40px; border-radius:50%; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser;

        function login() {
            const name = document.getElementById('username').value;
            const key = document.getElementById('secure-key').value;
            if(name && key === "OMO_SAFETY_2026_SECURE") {
                myUser = name;
                socket.emit('verify_secure_access', { username: name, key: key });
            } else { alert("ስህተት!"); }
        }

        socket.on('login_success', d => {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        });

        // ፋይል ለመላክ
        function triggerFile() { document.getElementById('fileInput').click(); }
        function sendFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                socket.emit('chat_message', { user: myUser, text: file.name, file: reader.result, fType: file.type });
            };
        }

        // ቪዲዮ ኮንፈረንስ
        async function startCall() {
            document.getElementById('video-grid').style.display = 'grid';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            socket.emit('start_conference', { from: myUser });
        }

        function endCall() {
            location.reload(); // ለጊዜው ሪፍሬሽ በማድረግ ጥሪውን ይዘጋል
        }

        function send() {
            const txt = document.getElementById('msgInput').value;
            if(txt) {
                socket.emit('chat_message', { user: myUser, text: txt });
                document.getElementById('msgInput').value = '';
            }
        }

        function displayMsg(d) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = d.user === myUser;
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            
            let content = d.text;
            if(d.file) {
                if(d.fType.startsWith('image/')) content = `<img src="${d.file}"><br><small>${d.text}</small>`;
                else content = `<i class="fas fa-file"></i> <a href="${d.file}" download="${d.text}" style="color:white;">${d.text}</a>`;
            }
            div.innerHTML = isMe ? content : `<b>${d.user}</b><br>${content}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('chat_message', d => displayMsg(d));
        socket.on('chat_history', h => h.forEach(displayMsg));
        socket.on('incoming_conference', d => alert(d.from + " የቪዲዮ ኮንፈረንስ ጀምሯል! ለመቀላቀል የቪዲዮ ምልክቱን ይጫኑ።"));
    </script>
</body>
</html>
