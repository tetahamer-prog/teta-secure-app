<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA Messenger PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tg-blue: #2481cc;
            --tg-bg: #ffffff;
            --tg-sidebar: #ffffff;
            --tg-header: #527da3;
            --tg-msg-in: #effdde;
            --tg-active-chat: #f1f1f1;
            --tg-muted: #707579;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #e6eff5; }

        /* Sidebar (የግራ ሜኑ) */
        #menu-sidebar {
            width: 280px; background: white; position: fixed; left: -280px; height: 100%;
            transition: 0.3s; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        #menu-sidebar.active { left: 0; }

        /* Chat List Column (የቻት ዝርዝር በግራ) */
        #chat-list-column {
            width: 350px; background: white; border-right: 1px solid #e6e6e6;
            display: flex; flex-direction: column; z-index: 500;
        }

        .search-bar { padding: 10px; background: white; }
        .search-input {
            width: 100%; padding: 8px 15px; background: #f1f1f1; border: none;
            border-radius: 20px; outline: none; box-sizing: border-box;
        }

        .chat-item {
            padding: 12px 15px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; border-bottom: 1px solid #f9f9f9; transition: 0.2s;
        }
        .chat-item:hover { background: #f4f4f4; }
        .chat-item.active { background: #e4f2ff; }
        
        .chat-avatar {
            width: 50px; height: 50px; border-radius: 50%; background: var(--tg-blue);
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; flex-shrink: 0;
        }

        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; color: #000; }
        .chat-last-msg { font-size: 13px; color: var(--tg-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Main Chat Window */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #9db2bf url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        header { background: var(--tg-header); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        .menu-btn { cursor: pointer; font-size: 20px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14.5px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: var(--tg-msg-in); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }

        .input-bar { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        #msg-input { flex: 1; border: none; outline: none; font-size: 16px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 900; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #chat-list-column { width: 100%; }
            #main-chat { display: none; position: fixed; width: 100%; height: 100%; }
            #main-chat.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeSidebar()"></div>

    <div id="menu-sidebar">
        <div style="background: var(--tg-header); padding: 30px 20px; color: white;">
            <div id="my-avatar" style="width: 50px; height: 50px; background: #2481cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; border: 2px solid white;">U</div>
            <b id="my-name">User Name</b><br>
            <small>TETA Secure Active</small>
        </div>
        <div style="padding: 10px 0;">
            <div class="chat-item"><i class="fas fa-users"></i> New Group</div>
            <div class="chat-item"><i class="fas fa-bullhorn"></i> New Channel</div>
            <div class="chat-item"><i class="fas fa-user"></i> Contacts</div>
            <div class="chat-item" onclick="location.reload()" style="color: red;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div id="chat-list-column">
        <div class="search-bar" style="display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-bars" onclick="openSidebar()" style="cursor:pointer; color: var(--tg-muted);"></i>
            <input type="text" class="search-input" placeholder="Search">
        </div>
        <div id="chats-container" style="overflow-y: auto; flex: 1;">
            <div class="chat-item active" onclick="selectChat('TETA AI ✨', 'T')">
                <div class="chat-avatar">✨</div>
                <div class="chat-info">
                    <div class="chat-name">TETA AI ✨</div>
                    <div class="chat-last-msg">እንዴት ልርዳዎት? ጥያቄዎን ይጠይቁ።</div>
                </div>
            </div>
            <div class="chat-item" onclick="selectChat('ኦሞ ጸጥታ ግሩፕ', 'O')">
                <div class="chat-avatar" style="background: #e67e22;">O</div>
                <div class="chat-info">
                    <div class="chat-name">ኦሞ ጸጥታ ግሩፕ</div>
                    <div class="chat-last-msg">የዛሬው ሪፖርት ደርሷል...</div>
                </div>
            </div>
            <div class="chat-item" onclick="selectChat('Saved Messages', 'S')">
                <div class="chat-avatar" style="background: #3498db;"><i class="fas fa-bookmark"></i></div>
                <div class="chat-info">
                    <div class="chat-name">Saved Messages</div>
                    <div class="chat-last-msg">የግል ማስታወሻዎች...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-chat">
        <header>
            <i class="fas fa-arrow-left" id="back-btn" onclick="backToList()" style="display:none; cursor:pointer;"></i>
            <div class="chat-avatar" id="header-avatar" style="width: 40px; height: 40px; font-size: 16px;">✨</div>
            <div style="flex: 1;">
                <b id="chat-with-name">TETA AI ✨</b><br>
                <small id="chat-status">online</small>
            </div>
            <i class="fas fa-ellipsis-v" style="cursor:pointer; opacity: 0.7;"></i>
        </header>

        <div id="chat-box"></div>

        <div class="input-bar">
            <i class="far fa-smile" style="font-size: 22px; color: var(--tg-muted); cursor:pointer;"></i>
            <input type="text" id="msg-input" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') send()">
            <i class="fas fa-paper-plane" onclick="send()" style="color: var(--tg-blue); font-size: 22px; cursor: pointer;"></i>
        </div>
    </div>

    <div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; z-index:2000;">
        <div style="text-align:center; width:300px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="60" style="margin-bottom:20px;">
            <h2 style="color: var(--tg-blue);">TETA SECURE</h2>
            <input id="u-name" placeholder="ሙሉ ስም" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <input id="u-key" placeholder="ሚስጥራዊ ቁልፍ" type="password" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--tg-blue); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ይግቡ</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName;

        function openSidebar() { document.getElementById('menu-sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeSidebar() { document.getElementById('menu-sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }

        function login() {
            const u = document.getElementById('u-name').value;
            const k = document.getElementById('u-key').value;
            if(u && k === "OMO_SAFETY_2026_SECURE") {
                myName = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('my-name').innerText = u;
                document.getElementById('my-avatar').innerText = u.charAt(0).toUpperCase();
                socket.emit('verify_secure_access', { username: u, key: k });
            } else { alert("መረጃ ተሳስቷል!"); }
        }

        function selectChat(name, initial) {
            document.getElementById('chat-with-name').innerText = name;
            document.getElementById('header-avatar').innerText = initial;
            document.getElementById('chat-box').innerHTML = ""; // ቻቱን አጽዳ
            
            // ሞባይል ከሆነ ቻቱን ሙሉ ስክሪን አድርግ
            if(window.innerWidth <= 768) {
                document.getElementById('main-chat').classList.add('active');
                document.getElementById('back-btn').style.display = "block";
            }
        }

        function backToList() {
            document.getElementById('main-chat').classList.remove('active');
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                socket.emit('chat_message', { user: myName, text: input.value });
                input.value = '';
            }
        }

        socket.on('chat_message', (data) => {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            const isMe = data.user === myName;
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<b>${data.user}</b><br>${data.text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
