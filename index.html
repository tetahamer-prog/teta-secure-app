<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETA SECURE v3.5 - Story & AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --side: #111b21; --header: #202c33; --primary: #00a884; --text: #e9edef; --muted: #8696a0; --sent: #005c4b; --received: #202c33; --accent: #ffd700; }
        .light-mode { --bg: #f0f2f5; --side: #ffffff; --header: #008069; --primary: #008069; --text: #111b21; --muted: #667781; --sent: #d9fdd3; --received: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: var(--side); position: absolute; left: -300px; height: 100%; transition: 0.3s; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        #sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 900; }
        
        .side-profile { padding: 40px 20px 20px; background: var(--header); text-align: center; border-bottom: 2px solid var(--primary); }
        .p-avatar { width: 90px; height: 90px; border-radius: 50%; background: #2a3942; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; position: relative; border: 3px solid var(--accent); overflow: hidden; cursor: pointer; }
        .p-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* Story Area */
        #story-bar { display: flex; gap: 15px; padding: 15px; background: var(--side); border-bottom: 1px solid rgba(255,255,255,0.05); overflow-x: auto; white-space: nowrap; }
        .story-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; flex-shrink: 0; cursor: pointer; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .add-story { border: 2px dashed var(--muted); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); }

        /* AI Panel */
        #ai-panel { display: none; background: #1c2a33; border: 1px solid var(--accent); padding: 15px; border-radius: 10px; margin: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .menu-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .menu-item:hover { background: rgba(255,255,255,0.05); }

        #main { flex: 1; display: none; flex-direction: column; }
        header { background: var(--header); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="side-profile">
            <div class="p-avatar" onclick="document.getElementById('pp-upload').click()">
                <i class="fas fa-camera" id="cam-hint" style="position:absolute; opacity:0.5;"></i>
                <img id="pp-img" src="" style="display:none;">
            </div>
            <input type="file" id="pp-upload" style="display:none" accept="image/*" onchange="loadPP(this)">
            <b id="user-display">ተጠቃሚ</b><br>
            <small style="color: var(--accent);">መስመር ላይ ✅</small>
        </div>

        <div style="color: var(--primary); padding: 15px 20px 5px; font-weight: bold;">SETTINGS</div>
        
        <div class="menu-item" onclick="openAISetting()" style="background: rgba(255, 215, 0, 0.1);">
            <i class="fas fa-robot" style="color: var(--accent);"></i> TETA AI ረዳት (Ask Me)
        </div>

        <div class="menu-item" onclick="toggleNight()"><i class="fas fa-moon"></i> የሌሊት ሁነታ (Night Mode)</div>
        <div class="menu-item" onclick="alert('Notification Active')"><i class="fas fa-bell"></i> ማሳወቂያዎች</div>
        <div class="menu-item" onclick="clearChat()"><i class="fas fa-trash-alt"></i> ታሪክ አጽዳ</div>
        <div class="menu-item" onclick="location.reload()" style="color:red;"><i class="fas fa-sign-out-alt"></i> ውጣ</div>

        <div style="margin-top:auto; padding: 20px; text-align: center; font-size: 10px; opacity: 0.5;">
            TETA SECURE v3.5 PRO<br>© 2026 Omo Safety
        </div>
    </div>

    <div id="main">
        <header>
            <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor:pointer; font-size:22px;"></i>
            <div style="text-align:center"><b>TETA HUB</b></div>
            <i class="fas fa-video" style="opacity:0.7"></i>
        </header>

        <div id="story-bar">
            <div class="story-circle add-story" onclick="document.getElementById('story-upload').click()"><i class="fas fa-plus"></i></div>
            <input type="file" id="story-upload" style="display:none" onchange="addStory(this)">
            <div id="stories-container" style="display:flex; gap:10px;"></div>
        </div>

        <div id="ai-panel">
            <div style="display:flex; justify-content:space-between;">
                <b style="color:var(--accent)">✨ TETA AI ረዳት</b>
                <i class="fas fa-times" onclick="document.getElementById('ai-panel').style.display='none'" style="cursor:pointer"></i>
            </div>
            <p style="font-size:12px; margin:10px 0;">የፈለጉትን ጥያቄ እዚህ ይጠይቁኝ፡</p>
            <input type="text" id="ai-q" placeholder="ጥያቄዎን እዚህ ይጻፉ..." style="width:100%; padding:8px; border-radius:5px; border:none; background:#0b141a; color:white;">
            <button onclick="askAI()" style="width:100%; margin-top:10px; padding:8px; background:var(--accent); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">AI ን ጠይቅ</button>
        </div>

        <div id="chat-box"></div>

        <div style="background:var(--header); padding:10px; display:flex; align-items:center; gap:10px;">
            <i class="fas fa-microphone" onclick="startVoice()" style="cursor:pointer; font-size:20px;"></i>
            <input type="text" id="msg-in" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--primary); border:none; width:40px; height:40px; border-radius:50%; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="auth" style="margin:auto; width:280px; padding:40px; background:var(--side); border-radius:20px; text-align:center; border:1px solid var(--primary);">
        <h2 style="color:var(--primary)">TETA LOGIN</h2>
        <input id="u-name" placeholder="ሙሉ ስም" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none; background:#2a3942; color:white;">
        <input id="u-key" placeholder="ቁልፍ" type="password" style="width:100%; padding:10px; margin:10px 0; border-radius:5px; border:none; background:#2a3942; color:white;">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer;">ግባ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleNight() { document.body.classList.toggle('light-mode'); }

        // 1. Profile Photo
        function loadPP(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('pp-img').src = e.target.result;
                    document.getElementById('pp-img').style.display = 'block';
                    document.getElementById('cam-hint').style.display = 'none';
                    socket.emit('save_call_record', { fileName: `PP_${myName}.jpg`, blob: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 2. Story Feature
        function addStory(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const container = document.getElementById('stories-container');
                    const div = document.createElement('div');
                    div.className = 'story-circle';
                    div.innerHTML = `<img src="${e.target.result}" onclick="alert('ይህ የእርስዎ ስቶሪ ነው!')">`;
                    container.prepend(div);
                    socket.emit('save_call_record', { fileName: `STORY_${Date.now()}.jpg`, blob: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 3. AI Setting Action
        function openAISetting() {
            document.getElementById('ai-panel').style.display = 'block';
            toggleSidebar(); // ሜኑውን ዝጋው
        }

        function askAI() {
            const q = document.getElementById('ai-q').value;
            if(q) {
                addMsg({ user: "እርስዎ", text: q });
                setTimeout(() => {
                    addMsg({ user: "TETA AI ✨", text: `ለጥያቄዎ "${q}" ምላሽ፡ በደቡብ ኦሞ የጸጥታ ዳታቤዝ መሰረት ትንታኔው ተጠናቋል። [AI Result Here]`, isAI: true });
                }, 1000);
                document.getElementById('ai-q').value = '';
            }
        }

        function login() {
            const u = document.getElementById('u-name').value;
            const k = document.getElementById('u-key').value;
            if(u && k === "OMO_SAFETY_2026_SECURE") {
                myName = u;
                socket.emit('verify_secure_access', { username: u, key: k });
            }
        }

        socket.on('login_success', () => {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('user-display').innerText = myName;
        });

        function send() {
            const t = document.getElementById('msg-in').value;
            if(t) {
                socket.emit('chat_message', { user: myName, text: t });
                document.getElementById('msg-in').value = '';
            }
        }

        function addMsg(d) {
            const b = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `m-bubble ${d.user === myName ? 'sent' : 'received'} ${d.isAI ? 'ai-bubble' : ''}`;
            div.style.background = d.isAI ? '#1c2a33' : (d.user === myName ? 'var(--sent)' : 'var(--received)');
            div.innerHTML = `<b>${d.user}</b><br>${d.text}`;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        }

        socket.on('chat_message', d => addMsg(d));
    </script>
</body>
</html>
